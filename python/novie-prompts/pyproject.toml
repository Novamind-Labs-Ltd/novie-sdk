[project]
name = "novie-prompts"
version = "0.1.0"
description = "Fail-soft Langfuse-managed prompt fetch with in-repo fallback (ADR-075)."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "langfuse>=2.50,<3",
    "httpx>=0.27",  # registry.py imports httpx directly for timeout classification; declare it (don't rely on langfuse's transitive pin)
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/novie_prompts"]

[tool.pytest.ini_options]
testpaths = ["tests"]
