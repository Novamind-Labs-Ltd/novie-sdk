[project]
name = "novie-prompts"
version = "0.1.0"
description = "Cross-agent prompt management for Novie (fail-soft Langfuse fetch + in-repo fallback)"
requires-python = ">=3.13"
dependencies = ["langfuse>=2.50,<3"]

[project.optional-dependencies]
dev = ["pytest", "httpx"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/novie_prompts"]

[project.scripts]
novie-prompts = "novie_prompts.cli:main"
