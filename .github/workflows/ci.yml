name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python-sdk:
    name: Python SDK
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install SDK with dev deps
        working-directory: python/novie-agent-sdk
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        working-directory: python/novie-agent-sdk
        run: pytest -q

  novie-prompts:
    name: novie-prompts (py${{ matrix.python-version }} / langfuse ${{ matrix.langfuse-spec }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]
        langfuse-spec:
          - "langfuse>=2.50,<3"   # oldest-supported (v2)
          - "langfuse>=4,<5"      # latest (v4)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install novie-prompts with dev deps
        working-directory: python/novie-prompts
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pin langfuse version
        run: pip install "${{ matrix.langfuse-spec }}"

      - name: Run tests
        working-directory: python/novie-prompts
        run: pytest -q
