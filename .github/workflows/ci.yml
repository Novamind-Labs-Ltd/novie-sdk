name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python-sdk:
    name: Python SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # novie-agent-sdk depends on novie-protocol pulled via git+ssh from a
      # separate private repo. The default GITHUB_TOKEN can't reach it, so we
      # load a read-only deploy key for novie-protocol into the SSH agent.
      # Set the secret `NOVIE_PROTOCOL_DEPLOY_KEY` on this repo.
      - name: Set up SSH for novie-protocol
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.NOVIE_PROTOCOL_DEPLOY_KEY }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install SDK with dev deps
        working-directory: python/novie-agent-sdk
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        working-directory: python/novie-agent-sdk
        run: pytest -q
